on:
  push:
    branches:
      - main

concurrency: deploy

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '^1.26.0'
          check-latest: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Build Lambda binaries
        run: |
          mkdir -p dist/alexa dist/sqs
          GOOS=linux GOARCH=arm64 go build -o dist/alexa/bootstrap ./cmd/alexa
          GOOS=linux GOARCH=arm64 go build -o dist/sqs/bootstrap ./cmd/sqs

      - name: Install Pulumi dependencies
        run: npm install
        working-directory: ./pulumi

      - name: Set Pulumi secrets from GitHub secrets
        run: |
          pulumi config set --secret openAIApiKey        "${{ secrets.OPENAI_API_KEY }}"       --stack prod
          pulumi config set --secret geminiApiKey        "${{ secrets.GEMINI_API_KEY }}"        --stack prod
          pulumi config set --secret vertexApiKey        "${{ secrets.VERTEX_API_KEY }}"        --stack prod
          pulumi config set --secret cloudFlareAccountId "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" --stack prod
          pulumi config set --secret cloudFlareAPIKey    "${{ secrets.CLOUDFLARE_API_KEY }}"    --stack prod
          pulumi config set --secret anthropicAPIKey     "${{ secrets.ANTHROPIC_API_KEY }}"     --stack prod
        working-directory: ./pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: prod
          work-dir: ./pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
